<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apni Manzil | Professional Logistics</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <link href="[https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap](https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap)" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #ffffff; }
        .hero-gradient { background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="text-slate-800">
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-blue-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold">AM</div>
            <div class="flex flex-col">
                <h1 class="text-xl font-extrabold text-blue-800 tracking-tight leading-none">APNI MANZIL</h1>
                <span class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">Fastest Logistics</span>
            </div>
        </div>
        <button onclick="alert('Admin Panel Loading...')" class="bg-blue-50 text-blue-700 px-5 py-2 rounded-full text-xs font-bold uppercase hover:bg-blue-100 transition">Admin</button>
    </nav>

    <header class="hero-gradient py-20 px-6 text-center">
        <h2 class="text-4xl md:text-6xl font-extrabold text-slate-900 mb-6 tracking-tight">Tumche Saman, <br><span class="text-blue-600">Amchi Jababdari.</span></h2>
        <p class="text-slate-500 max-w-2xl mx-auto text-lg mb-10">Bharatatil sarvottam courier ani transport service.</p>
        <button class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg shadow-blue-200">Track Order</button>
    </header>

    <footer class="py-12 bg-white border-t border-slate-100 text-center">
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">© 2024 Apni Manzil Logistics</p>
    </footer>
</body>
</html>
